<!DOCTYPE html>
<html lang="el"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Εύρεση Λάμας &amp; Αλυσίδας</title>
<style>
 *{box-sizing:border-box} body{font-family:system-ui,Arial,sans-serif;margin:0;background:#f5f6f8;color:#1c1c1c}
 .wrap{max-width:920px;margin:0 auto;padding:20px}
 h1{font-size:20px;font-weight:600;margin:0 0 16px}
 .pickers{display:flex;gap:12px;flex-wrap:wrap}
 .field{flex:1;min-width:220px} label{display:block;font-size:13px;color:#555;margin-bottom:4px}
 select{width:100%;padding:10px;font-size:15px;border:1px solid #ccc;border-radius:8px;background:#fff}
 select:disabled{background:#eee;color:#999}
 .msg{margin-top:16px;padding:12px 14px;border-radius:8px;font-size:14px}
 .msg.err{background:#fdecea;border:1px solid #f5c6cb;color:#a12} .msg.load{background:#eef;border:1px solid #ccd;color:#446}
 .detail{margin-top:18px;background:#fff;border:1px solid #e3e3e3;border-radius:10px;padding:16px 18px;display:none}
 .detail.show{display:block}
 .detail .title{font-size:17px;font-weight:600;margin:0}
 .detail .sku{font-size:13px;color:#888;margin:2px 0 14px;font-family:monospace}
 .detail .specs-h{font-size:13px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.03em;margin:0 0 8px}
 .specs{display:grid;grid-template-columns:max-content 1fr;gap:6px 16px;font-size:14px}
 .specs dt{color:#666} .specs dd{margin:0;font-weight:500}
 .cols{display:flex;gap:16px;margin-top:18px;flex-wrap:wrap}
 .col{flex:1;min-width:280px;background:#fff;border:1px solid #e3e3e3;border-radius:10px;overflow:hidden}
 .col h2{font-size:15px;font-weight:600;margin:0;padding:12px 14px;background:#fafafa;border-bottom:1px solid #eee;display:flex;justify-content:space-between}
 .col h2 .cnt{color:#888;font-weight:400}
 .col.guides h2{background:#e1f5ee} .col.chains h2{background:#faece7}
 ul{list-style:none;margin:0;padding:0} li{padding:9px 14px;font-size:14px;border-bottom:1px solid #f2f2f2;line-height:1.4}
 li:last-child{border-bottom:none} .empty{padding:14px;color:#999;font-size:14px}
 li.oos{color:#c0392b}
 .legend{margin-top:10px;font-size:12px;color:#888} .legend .r{color:#c0392b}
</style></head><body><div class="wrap">
<h1>Εύρεση συμβατής Λάμας &amp; Αλυσίδας</h1>
<div class="pickers">
 <div class="field"><label>Μάρκα</label><select id="brand" disabled></select></div>
 <div class="field"><label>Μοντέλο / Προϊόν</label><select id="model" disabled></select></div>
</div>
<div id="status" class="msg load">Φόρτωση δεδομένων…</div>

<div class="detail" id="detail">
 <p class="title" id="d-name"></p>
 <p class="sku" id="d-sku"></p>
 <p class="specs-h">Τεχνικά χαρακτηριστικά</p>
 <dl class="specs">
   <dt>Μήκος</dt><dd id="d-length"></dd>
   <dt>Mount</dt><dd id="d-mount"></dd>
   <dt>Βήμα (Pitch)</dt><dd id="d-pitch"></dd>
   <dt>Πάχος (Gauge)</dt><dd id="d-gauge"></dd>
   <dt>Οδηγοί (Links)</dt><dd id="d-links"></dd>
 </dl>
</div>

<div class="cols">
 <div class="col guides"><h2>Συμβατές Λάμες <span class="cnt" id="gc"></span></h2><ul id="guides"><li class="empty">Επιλέξτε μοντέλο</li></ul></div>
 <div class="col chains"><h2>Συμβατές Αλυσίδες <span class="cnt" id="cc"></span></h2><ul id="chains"><li class="empty">Επιλέξτε μοντέλο</li></ul></div>
</div>
<p class="legend"><span class="r">Κόκκινο</span> = προϊόν χωρίς διαθέσιμο απόθεμα (0 stock)</p>
</div>
<script>
/* ---------- CSV parse + shaping (CB_key joins saw↔bar, BC_key joins bar↔chain) ---------- */
function parseCSV(text){
  if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
  const firstLine=text.slice(0, text.indexOf('\n'));
  const counts={',':(firstLine.match(/,/g)||[]).length, ';':(firstLine.match(/;/g)||[]).length, '\t':(firstLine.match(/\t/g)||[]).length};
  const delim=Object.keys(counts).sort((a,b)=>counts[b]-counts[a])[0];
  const rows=[]; let row=[], field='', q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else q=false; } else field+=c; }
    else{ if(c==='"') q=true; else if(c===delim){row.push(field);field='';}
      else if(c==='\n'){row.push(field);rows.push(row);row=[];field='';}
      else if(c==='\r'){} else field+=c; }}
  if(field.length||row.length){row.push(field);rows.push(row);}
  const header=rows.shift().map(h=>h.trim());
  return rows.filter(r=>r.length>1).map(r=>{const o={};header.forEach((h,i)=>o[h]=(r[i]??'').trim());return o;});
}
function shape(records){
  const H={sub:'Υποκατηγορία',brand:'Brand',sku:'SKU',desc:'Περιγραφή webApp',
           mount:'Mount',pitch:'Pitch',gauge:'Gauge',links:'links',lcm:'length cm',lin:'length "',
           cb:'CB_key',bc:'BC_key',own:'OwnProduct',stock:'Stock'};
  const bad=new Set(['','nan','none','undefined']); const good=v=>v&&!bad.has(String(v).trim().toLowerCase());
  const isOwn=r=>parseFloat(r[H.own])===1;
  const MACHINE=new Set(['αλυσοπρίονα','κονταροπρίονα']); const lc=v=>String(v||'').trim().toLowerCase();
  const machines=[],bars=[],chains=[];
  for(const r of records){const sub=lc(r[H.sub]);
    if(MACHINE.has(sub)){
      if((good(r[H.cb])||good(r[H.bc]))&&good(r[H.desc])) machines.push({b:r[H.brand],n:r[H.desc],sku:r[H.sku],mount:r[H.mount],pitch:r[H.pitch],gauge:r[H.gauge],links:r[H.links],lcm:r[H.lcm],lin:r[H.lin],cb:good(r[H.cb])?String(r[H.cb]).trim():'',bc:good(r[H.bc])?String(r[H.bc]).trim():''});
    }else if(sub==='λάμες'){
      if(isOwn(r)&&good(r[H.cb])) bars.push({br:r[H.brand],d:r[H.desc],sku:r[H.sku],cb:String(r[H.cb]).trim(),st:r[H.stock]});
    }else if(sub==='αλυσίδες τεμάχια'){
      if(isOwn(r)&&good(r[H.bc])) chains.push({br:r[H.brand],d:r[H.desc],sku:r[H.sku],bc:String(r[H.bc]).trim(),st:r[H.stock]});
    }}
  return {machines,bars,chains};
}
/* ---------- UI ---------- */
const $=id=>document.getElementById(id);
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function uniq(a){return [...new Set(a)];}
function num(v){const n=parseFloat(v);return isNaN(n)?v:(Number.isInteger(n)?n:String(n));}
function label(x){return [x.br,x.d,x.sku].filter(Boolean).join(' - ');}
let DATA={machines:[],bars:[],chains:[]}, barsByCB={}, chainsByBC={};
const brandSel=$('brand'), modelSel=$('model');

function init(d){
  DATA=d; barsByCB={}; chainsByBC={};
  for(const b of DATA.bars)(barsByCB[b.cb]=barsByCB[b.cb]||[]).push(b);
  for(const c of DATA.chains)(chainsByBC[c.bc]=chainsByBC[c.bc]||[]).push(c);
  const brands=[...new Set(DATA.machines.map(s=>s.b))].sort((a,b)=>String(a).localeCompare(b,'el'));
  brandSel.innerHTML='<option value="">— επιλέξτε —</option>'+brands.map(b=>`<option>${esc(b)}</option>`).join('');
  brandSel.disabled=false; $('status').style.display='none';
}
function vals(rows,f){return uniq(rows.map(r=>r[f]).filter(x=>x!=='' && x!=null));}
function set(id,arr){$(id).textContent=arr.length?arr.join(', '):'—';}
brandSel.onchange=()=>{
  const models=[...new Set(DATA.machines.filter(s=>s.b===brandSel.value).map(s=>s.n))].sort((a,b)=>String(a).localeCompare(b,'el'));
  modelSel.innerHTML='<option value="">— επιλέξτε —</option>'+models.map(m=>`<option>${esc(m)}</option>`).join('');
  modelSel.disabled=!models.length; render();
};
modelSel.onchange=render;
function render(){
  const detail=$('detail'), guidesUl=$('guides'), chainsUl=$('chains');
  if(!modelSel.value){detail.classList.remove('show');guidesUl.innerHTML=chainsUl.innerHTML='<li class="empty">Επιλέξτε μοντέλο</li>';$('gc').textContent=$('cc').textContent='';return;}
  const rows=DATA.machines.filter(s=>s.b===brandSel.value&&s.n===modelSel.value);
  detail.classList.add('show');
  $('d-name').textContent=modelSel.value;
  $('d-sku').textContent=vals(rows,'sku').join(' / ')||'—';
  const lengths=uniq(rows.map(r=>{const cm=num(r.lcm),inch=num(r.lin);
     if(r.lcm&&r.lin)return cm+' cm / '+inch+'"'; if(r.lcm)return cm+' cm'; if(r.lin)return inch+'"'; return '';}).filter(Boolean));
  set('d-length',lengths); set('d-mount',vals(rows,'mount')); set('d-pitch',vals(rows,'pitch'));
  set('d-gauge',vals(rows,'gauge').map(g=>num(g)+' mm')); set('d-links',vals(rows,'links').map(num));
  // saw --CB_key--> bars (guides);  saw --BC_key--> chains (direct)
  const cbKeys=uniq(rows.map(s=>s.cb).filter(Boolean));
  const bcKeys=uniq(rows.map(s=>s.bc).filter(Boolean));
  const gMap=new Map(), cMap=new Map();
  for(const k of cbKeys) for(const b of (barsByCB[k]||[])) gMap.set(b.sku||label(b), b);
  for(const k of bcKeys) for(const c of (chainsByBC[k]||[])) cMap.set(c.sku||label(c), c);
  const g=[...gMap.values()].sort((a,b)=>label(a).localeCompare(label(b),'el'));
  const ch=[...cMap.values()].sort((a,b)=>label(a).localeCompare(label(b),'el'));
  $('gc').textContent=g.length; $('cc').textContent=ch.length;
  const li=x=>`<li class="${parseFloat(x.st)<=0?'oos':''}">${esc(label(x))}</li>`;
  guidesUl.innerHTML=g.length?g.map(li).join(''):'<li class="empty">Δεν βρέθηκαν</li>';
  chainsUl.innerHTML=ch.length?ch.map(li).join(''):'<li class="empty">Δεν βρέθηκαν</li>';
}
/* ---------- load CSV ---------- */
fetch('data.csv',{cache:'no-store'})
  .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status); return r.text();})
  .then(t=>init(shape(parseCSV(t))))
  .catch(e=>{$('status').className='msg err';
    $('status').textContent='Δεν φορτώθηκε το data.csv ('+e.message+'). Το αρχείο πρέπει να βρίσκεται δίπλα στο index.html και η σελίδα να ανοίγει μέσω διακομιστή (π.χ. GitHub Pages), όχι με διπλό κλικ.';});
</script></body></html>
