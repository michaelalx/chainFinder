function label(x){return [x.br,x.d,x.sku].filter(Boolean).join(' - ');}
const byKeyBars={}, byKeyChains={};
for(const x of DATA.bars){(byKeyBars[x.k]=byKeyBars[x.k]||[]).push(label(x));}
for(const x of DATA.chains){(byKeyChains[x.k]=byKeyChains[x.k]||[]).push(label(x));}
const brandSel=document.getElementById('brand'), modelSel=document.getElementById('model');
const brands=[...new Set(DATA.machines.map(s=>s.b))].sort((a,b)=>a.localeCompare(b,'el'));
brandSel.innerHTML='<option value="">— επιλέξτε —</option>'+brands.map(b=>`<option>${esc(b)}</option>`).join('');
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function uniq(a){return [...new Set(a)];}
function num(v){const n=parseFloat(v);return isNaN(n)?v:(Number.isInteger(n)?n:String(n));}
function vals(rows,f){return uniq(rows.map(r=>r[f]).filter(x=>x!=='' && x!=null));}
function set(id,arr){document.getElementById(id).textContent=arr.length?arr.join(', '):'—';}
brandSel.onchange=()=>{
  const models=[...new Set(DATA.machines.filter(s=>s.b===brandSel.value).map(s=>s.n))].sort((a,b)=>a.localeCompare(b,'el'));
  modelSel.innerHTML='<option value="">— επιλέξτε —</option>'+models.map(m=>`<option>${esc(m)}</option>`).join('');
  modelSel.disabled=!models.length; render();
};
modelSel.onchange=render;
function render(){
  const detail=document.getElementById('detail');
  const guidesUl=document.getElementById('guides'), chainsUl=document.getElementById('chains');
  if(!modelSel.value){detail.classList.remove('show');guidesUl.innerHTML=chainsUl.innerHTML='<li class="empty">Επιλέξτε μοντέλο</li>';document.getElementById('gc').textContent=document.getElementById('cc').textContent='';return;}
  const rows=DATA.machines.filter(s=>s.b===brandSel.value&&s.n===modelSel.value);
  detail.classList.add('show');
  document.getElementById('d-name').textContent=modelSel.value;
  document.getElementById('d-sku').textContent=vals(rows,'sku').join(' / ')||'—';
  const lengths=uniq(rows.map(r=>{const cm=num(r.lcm),inch=num(r.lin);
     if(r.lcm&&r.lin)return cm+' cm / '+inch+'"'; if(r.lcm)return cm+' cm'; if(r.lin)return inch+'"'; return '';}).filter(Boolean));
  set('d-length',lengths); set('d-mount',vals(rows,'mount')); set('d-pitch',vals(rows,'pitch'));
  set('d-gauge',vals(rows,'gauge').map(g=>num(g)+' mm')); set('d-links',vals(rows,'links').map(num));
  const keys=uniq(rows.map(s=>s.k));
  let g=[],ch=[]; for(const k of keys){g=g.concat(byKeyBars[k]||[]);ch=ch.concat(byKeyChains[k]||[]);}
  g=uniq(g).sort((a,b)=>a.localeCompare(b,'el')); ch=uniq(ch).sort((a,b)=>a.localeCompare(b,'el'));
  document.getElementById('gc').textContent=g.length; document.getElementById('cc').textContent=ch.length;
  guidesUl.innerHTML=g.length?g.map(n=>`<li>${esc(n)}</li>`).join(''):'<li class="empty">Δεν βρέθηκαν</li>';
  chainsUl.innerHTML=ch.length?ch.map(n=>`<li>${esc(n)}</li>`).join(''):'<li class="empty">Δεν βρέθηκαν</li>';
}
</script></body></html>
